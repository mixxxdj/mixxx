<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="theme-color" content="#121216">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mixxx">
    <link rel="stylesheet" href="main.css">
    <script src="mixxx.js"></script>
    <title>Library</title>
  </head>
  <body onload="checkauth()">
    <header><img alt="Mixxx" src="mixxx_logo.svg" /></header>
    <main>
      <div class="card">
        <h2>Library</h2>
        <div class="search-row">
          <input id="searchform" type="text" placeholder="Search title, artist, album">
          <button type="button" class="accent" onclick="search(document.getElementById('searchform').value)">Search</button>
        </div>
      </div>

      <div class="card" id="result">
      </div>

      <div class="toolbar" id="tools">
        <button class="accent" onclick="addtoautodj('begin');">Add to Begin</button>
        <button class="accent" onclick="addtoautodj('end');">Add to End</button>
      </div>

      <div class="card row" id="loaddeck">
        <label for="loaddeckselect">Deck</label>
        <select id="loaddeckselect"></select>
        <button class="accent" onclick="loaddeck(false);">Load</button>
        <button class="accent" onclick="loaddeck(true);">Load &amp; Play</button>
      </div>

      <button class="ghost full-width" onclick="window.location.href='index.html';">← Back</button>
    </main>
    <script>document.addEventListener("DOMContentLoaded", (event) => {populateLoadDeckSelect();});</script>
  </body>
</html>
