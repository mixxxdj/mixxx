<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="theme-color" content="#121216">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mixxx">
    <link rel="stylesheet" href="main.css">
    <script type="text/javascript" src="mixxx.js"></script>
    <title>mixxx</title>
  </head>
  <body>
    <header><img alt="Mixxx" src="mixxx_logo.svg" /></header>
    <main class="centered">
      <div class="card login-card">
        <h2>Login</h2>
        <form action="#" onsubmit="login(document.getElementById('pwinput').value); return false;">
          <label for="pwinput">Password</label>
          <input id="pwinput" type="password" placeholder="Enter password"
                 onkeydown="if(event.key==='Enter'){event.preventDefault();login(this.value);}">
          <br><br>
          <button type="submit" class="accent full-width">Login</button>
        </form>
      </div>
    </main>
  </body>
</html>
