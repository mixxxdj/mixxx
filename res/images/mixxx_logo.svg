<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  DJ Sugar — horizontal wordmark logo.
  Used in the About dialog (MIXXX_LOGO_PATH) and skin headers.
  Dimensions: 512 × 128  (4:1 aspect ratio — matches the original banner slot).

  Design:
  • Deep purple → charcoal gradient background.
  • A mini vinyl record on the left.
  • "DJ" in large white Impact-style text.
  • "SUGAR" in cyan (#01DCFC) to match the icon accent.
  • Subtle glow underneath the text.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.1"
     width="512" height="128"
     viewBox="0 0 512 128"
     id="djsugar-logo">

  <defs>
    <linearGradient id="bgLogo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1A0930"/>
      <stop offset="100%" stop-color="#0D0020"/>
    </linearGradient>
    <!-- Cyan glow behind "SUGAR". -->
    <filter id="glow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Vinyl gradient. -->
    <radialGradient id="vinylLogoGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#3D2050"/>
      <stop offset="100%" stop-color="#0D0012"/>
    </radialGradient>
    <radialGradient id="labelLogoGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFADD6"/>
      <stop offset="100%" stop-color="#E4467F"/>
    </radialGradient>
  </defs>

  <!-- Background. -->
  <rect width="512" height="128" rx="10" fill="url(#bgLogo)"/>

  <!-- ── Mini vinyl record (left side) ── -->
  <g transform="translate(64,64)">
    <!-- Disc. -->
    <circle r="48" fill="url(#vinylLogoGrad)"/>
    <!-- Groove rings. -->
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <circle r="39" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <circle r="34" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <circle r="29" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <!-- Label. -->
    <circle r="18" fill="url(#labelLogoGrad)"/>
    <!-- Spindle. -->
    <circle r="3"  fill="#0D0012"/>
    <!-- Tonearm (tiny). -->
    <line x1="38" y1="-34" x2="22" y2="-8"
          stroke="#E8E8F0" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="38" cy="-34" r="4" fill="#C0C0CC"/>
    <circle cx="22" cy="-8"  r="2" fill="#EA2A4E"/>
  </g>

  <!-- Subtle separator line. -->
  <line x1="124" y1="20" x2="124" y2="108"
        stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ── Wordmark ── -->
  <!-- "DJ" — white. -->
  <text x="148" y="82"
        font-family="Arial Black, Impact, sans-serif"
        font-size="72" font-weight="900"
        fill="#FFFFFF"
        dominant-baseline="middle"
        letter-spacing="4">DJ</text>

  <!-- "SUGAR" — cyan with glow. -->
  <text x="284" y="82"
        font-family="Arial Black, Impact, sans-serif"
        font-size="62" font-weight="900"
        fill="#01DCFC"
        dominant-baseline="middle"
        letter-spacing="6"
        filter="url(#glow)">SUGAR</text>

  <!-- Thin bottom accent line. -->
  <line x1="20" y1="122" x2="492" y2="122"
        stroke="#E4467F" stroke-width="2" stroke-linecap="round"
        opacity="0.6"/>
</svg>
