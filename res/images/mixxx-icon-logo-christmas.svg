<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  DJ Sugar application icon.
  Design: a vinyl record viewed from above, with the "DJ SUGAR" name on the
  centre label.  Uses a vivid pink-to-deep-purple gradient background so it
  reads on both light and dark launcher/taskbar surfaces.

  Coordinate system: 512 × 512 units, centred at (256, 256).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1"
     width="512" height="512"
     viewBox="0 0 512 512"
     id="djsugar-icon">

  <defs>
    <!-- Full-icon radial gradient: deep pink at edge → dark purple at centre. -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E4467F"/>
      <stop offset="100%" stop-color="#1A0930"/>
    </radialGradient>

    <!-- Record vinyl gradient: near-black with a subtle sheen. -->
    <radialGradient id="vinylGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#3D2050"/>
      <stop offset="100%" stop-color="#0D0012"/>
    </radialGradient>

    <!-- Centre label gradient: pink-candy. -->
    <radialGradient id="labelGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFADD6"/>
      <stop offset="100%" stop-color="#E4467F"/>
    </radialGradient>

    <!-- Groove shimmer: thin semi-transparent white ring, clipped to vinyl. -->
    <clipPath id="vinylClip">
      <circle cx="256" cy="256" r="230"/>
    </clipPath>
  </defs>

  <!-- ── Background circle ── -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- ── Vinyl record disc ── -->
  <circle cx="256" cy="256" r="230" fill="url(#vinylGrad)"/>

  <!-- Groove rings — 12 concentric semi-transparent lines to suggest grooves. -->
  <g stroke="rgba(255,255,255,0.08)" fill="none" clip-path="url(#vinylClip)">
    <circle cx="256" cy="256" r="210"/>
    <circle cx="256" cy="256" r="195"/>
    <circle cx="256" cy="256" r="180"/>
    <circle cx="256" cy="256" r="166"/>
    <circle cx="256" cy="256" r="152"/>
    <circle cx="256" cy="256" r="139"/>
    <circle cx="256" cy="256" r="127"/>
    <circle cx="256" cy="256" r="116"/>
    <circle cx="256" cy="256" r="106"/>
    <circle cx="256" cy="256" r="97"/>
    <circle cx="256" cy="256" r="89"/>
    <circle cx="256" cy="256" r="82"/>
  </g>

  <!-- Outer edge highlight ring. -->
  <circle cx="256" cy="256" r="229" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>

  <!-- ── Centre label ── -->
  <circle cx="256" cy="256" r="78" fill="url(#labelGrad)"/>
  <!-- Subtle inner border on label. -->
  <circle cx="256" cy="256" r="77" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- Label text: "DJ" on top line, "SUGAR" on bottom line. -->
  <!-- "DJ" — white, bold, large. -->
  <text x="256" y="245"
        font-family="Arial Black, Impact, sans-serif"
        font-size="42" font-weight="900"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="6">DJ</text>
  <!-- "SUGAR" — cyan-tinted, slightly smaller for visual hierarchy. -->
  <text x="256" y="284"
        font-family="Arial Black, Impact, sans-serif"
        font-size="28" font-weight="900"
        fill="#01DCFC"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="4">SUGAR</text>

  <!-- Spindle hole. -->
  <circle cx="256" cy="256" r="8" fill="#0D0012"/>
  <circle cx="256" cy="256" r="7" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <!-- ── Tonearm (decorative, top-right) ── -->
  <!-- Pivot base. -->
  <circle cx="415" cy="108" r="18" fill="#C0C0CC"/>
  <circle cx="415" cy="108" r="10" fill="#6E6E80"/>
  <circle cx="415" cy="108" r="4"  fill="#B0B0C0"/>

  <!-- Arm tube: from pivot to headshell near the groove edge. -->
  <line x1="413" y1="116"
        x2="315" y2="192"
        stroke="#E8E8F0" stroke-width="9" stroke-linecap="round"/>
  <!-- Darker inner highlight on arm. -->
  <line x1="413" y1="116"
        x2="315" y2="192"
        stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>

  <!-- Headshell. -->
  <polygon points="305,182 325,172 335,186 315,196"
           fill="#F0F0F8" stroke="#AAAABC" stroke-width="1.5"/>

  <!-- Stylus tip — glowing pink dot. -->
  <circle cx="303" cy="192" r="6" fill="#EA2A4E"/>
  <circle cx="303" cy="192" r="3" fill="#FF8AAD"/>

</svg>
