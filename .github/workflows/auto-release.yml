# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
# Auto-release workflow for winnerspiros/mixxx fork (DJ Sugar).
#
# Triggers:
#   - Push to main -> creates/updates a rolling "latest" pre-release.
#   - Manual workflow_dispatch -> create a versioned release (e.g. v2.7.0).
#   - Push of a version tag (vX.Y.Z) -> create a versioned release.
#
# Delegates the actual compilation to the reusable build.yml workflow,
# which handles all platform-specific details (MSVC toolchain setup,
# Android NDK/SDK, macOS codesigning, vcpkg deps, etc.).
#
# This workflow adds a release-publishing stage on top that collects
# the built artifacts (DEB, DMG x2, MSI x2) and publishes them to
# GitHub Releases.

name: Auto-Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: >
          Release version (e.g. v2.7.0). Leave empty to auto-detect from git
          describe.
        required: false
        default: ""
      prerelease:
        description: Mark as pre-release?
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: auto-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # needed to create/update GitHub Releases

jobs:
  # ── 1. Determine the version string used everywhere ──────────────────────
  version:
    name: Determine version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
      release_name: ${{ steps.ver.outputs.release_name }}
      tag_name: ${{ steps.ver.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full history for git describe

      - name: Compute version
        id: ver
        run: |
          set -euo pipefail

          # Priority 1: explicit manual input
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VER="${{ github.event.inputs.version }}"
          # Priority 2: pushed version tag
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${{ github.ref_name }}"
          # Priority 3: git describe (nightly / rolling build)
          else
            VER="$(git describe --tags --always --first-parent --dirty=-modified 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")"
          fi

          # Strip a leading 'v' for display; keep it in the tag name.
          TAG="$VER"
          [[ "$TAG" == v* ]] || TAG="v${TAG}"
          DISPLAY="${TAG#v}"

          # A release is a pre-release when it contains '-' after the semver
          # core (e.g. "2.7.0-alpha") OR when it is a nightly/git-describe
          # build (contains 'g' from git-describe or 'dev-').
          IS_PRE="false"
          if [[ "$DISPLAY" == *"-"* ]] || [[ "$DISPLAY" == *"g"* ]]; then
            IS_PRE="true"
          fi
          # Manual override wins.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IS_PRE="${{ github.event.inputs.prerelease }}"
          fi

          echo "version=${DISPLAY}"      >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRE}" >> "$GITHUB_OUTPUT"
          echo "release_name=DJ Sugar ${DISPLAY}" >> "$GITHUB_OUTPUT"

          echo "Version : ${DISPLAY}"
          echo "Tag     : ${TAG}"
          echo "PreRelease: ${IS_PRE}"

  # ── 2. Build every platform via the reusable build workflow ───────────────
  build:
    name: Build – ${{ matrix.name }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            artifacts_slug: ubuntu-jammy
          - name: macOS 15 x64
            artifacts_slug: macos-macosintel
          - name: macOS 15 arm64
            artifacts_slug: macos-macosarm
          - name: Windows 2022 x64
            artifacts_slug: windows-win64
          - name: Windows 11 ARM64
            artifacts_slug: windows-winarm

    uses: ./.github/workflows/build.yml
    with:
      publish: false
      branch: ${{ github.head_ref || github.ref_name }}
      ref: ${{ github.ref }}

  # ── 3. Publish GitHub Release ─────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs:
      - version
      - build
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    # Run even if some builds fail so we still get a release with partial assets.
    if: always() && needs.version.result == 'success'
    steps:
      - uses: actions/checkout@v6

      # Download artifacts from each build by slug name (build.yml uses
      # artifacts_slug as the upload-artifact name).
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          pattern: "*-*"
          merge-multiple: false

      # Flatten — each artifact is in its own sub-directory.
      - name: Flatten artifact directories
        run: |
          mkdir -p flat-assets
          find release-assets -type f \( -name "*.deb" -o -name "*.dmg" -o -name "*.msi" -o -name "*.apk" \) -exec mv {} flat-assets/ \;
          ls -lh flat-assets/

      # On main-branch pushes we keep a single rolling "latest" pre-release.
      # On tags / manual runs we create a versioned release.
      - name: Delete existing "latest" release (rolling update)
        if: github.ref_name == 'main' && github.ref_type == 'branch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --repo "${{ github.repository }}" 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          name: ${{ needs.version.outputs.release_name }}
          prerelease: ${{ needs.version.outputs.is_prerelease }}
          draft: false
          generate_release_notes: true
          files: flat-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
