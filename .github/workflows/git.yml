name: Git Checks

on:
  workflow_call:

jobs:
  block-fixup:
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Block Fixup Commit Merge
        run: |
          # Check for fixup! or squash! commits
          if git log --oneline origin/main..HEAD | grep -qE '^(fixup!|squash!)'; then
            echo "❌ Blocking merge: fixup! or squash! commits found:"
            git log --oneline origin/main..HEAD | grep -E '^(fixup!|squash!)'
            exit 1
          fi
          echo "✅ No fixup! or squash! commits found"
