name: soundtouch
buildsystem: cmake-ninja
config-opts:
  - -DCMAKE_BUILD_TYPE=RelWithDebInfo
  - -DSOUNDSTRETCH=OFF
sources:
  - type: archive
    url: https://codeberg.org/soundtouch/soundtouch/archive/2.4.1.tar.gz
    sha256: e07abf20ce8f95850c280132e1f61ad400fc1f4011b7fac698a503de6aab6733
    x-checker-data:
      type: anitya
      project-id: 115722
      stable-only: true
      url-template: https://codeberg.org/soundtouch/soundtouch/archive/$version.tar.gz
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
post-install:
  - install -Dm644 -t ${FLATPAK_DEST}/share/licenses/soundtouch COPYING.TXT
