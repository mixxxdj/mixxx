name: libid3tag
buildsystem: cmake-ninja
config-opts:
  - -DCMAKE_BUILD_TYPE=RelWithDebInfo
  - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
sources:
  - type: git
    url: https://codeberg.org/tenacityteam/libid3tag.git
    tag: "0.16.3"
    commit: e02ecf1276b467a8a5dd20c55ce711e6f7116d3e
    x-checker-data:
      type: anitya
      project-id: 21478
      stable-only: true
      url-template: https://codeberg.org/tenacityteam/libid3tag/archive/$version.tar.gz
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
post-install:
  - install -Dm644 -t ${FLATPAK_DEST}/share/licenses/libid3tag COPYING
